services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: flying-chess-online:latest
    container_name: flying-chess
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      # SQLite database — persists across restarts / image upgrades
      - db_data:/var/www/html/database
      # User-uploaded files (future use)
      - storage_data:/var/www/html/storage/app/public
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db_data:
    driver: local
  storage_data:
    driver: local
